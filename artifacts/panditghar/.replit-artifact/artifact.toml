kind = "web"
previewPath = "/"
title = "PanditGhar.in"
version = "1.0.0"
id = "artifacts/panditghar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23968

[services.development]
run = "pnpm --filter @workspace/panditghar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/panditghar", "run", "build" ]
publicDir = "artifacts/panditghar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23968"
BASE_PATH = "/"
