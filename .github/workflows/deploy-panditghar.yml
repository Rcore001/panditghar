name: Deploy PanditGhar.in to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/panditghar/**'
      - '.github/workflows/deploy-panditghar.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build for GitHub Pages
        run: pnpm --filter @workspace/panditghar run build:ghpages
        env:
          # Set this to your GitHub repository name (e.g. panditghar).
          # Leave as '/' if you're using a custom domain (e.g. panditghar.in).
          GHPAGES_BASE: ${{ vars.GHPAGES_BASE || '/panditghar/' }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/panditghar/dist/public
          publish_branch: gh-pages
          cname: ${{ vars.CUSTOM_DOMAIN || '' }}
          force_orphan: true
